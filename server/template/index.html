<html lang="ru" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['var(--font-primary)', 'Manrope', 'sans-serif'],
            },
            colors: {
              background: 'var(--color-background)',
              surface: 'var(--color-surface)',
              primary: 'var(--color-primary)',
              accent: 'var(--color-accent)',
              grayNoble: '#4b5563',
            },
            borderRadius: {
              'card': 'var(--radius-card)',
            },
            boxShadow: {
              'glow': '0 0 20px -5px rgba(var(--color-primary-rgb), 0.3)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --color-primary: #9d174d;
        --color-primary-rgb: 157, 23, 77;
        --color-accent: #be185d;
        --color-accent-rgb: 190, 24, 93;
        --color-background: #0c0c0e;
        --color-surface: #18181b;
        --color-text: #ffffff;
        --radius-card: 2rem;
        --font-primary: 'Manrope', sans-serif;
      }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--color-background); }
      ::-webkit-scrollbar-thumb { background: var(--color-primary); }
      ::-webkit-scrollbar-thumb:hover { background: var(--color-accent); }
    </style>
