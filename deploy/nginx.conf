# FitWebAI — Nginx config for wildcard subdomains
# Place in: /etc/nginx/sites-available/fitwebai
# Symlink:  ln -s /etc/nginx/sites-available/fitwebai /etc/nginx/sites-enabled/

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name fitwebai.ru *.fitwebai.ru;
    return 301 https://$host$request_uri;
}

# Main HTTPS server — wildcard
server {
    listen 443 ssl http2;
    server_name fitwebai.ru *.fitwebai.ru;

    # SSL — Let's Encrypt wildcard certificate
    ssl_certificate     /etc/letsencrypt/live/fitwebai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fitwebai.ru/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 5;

    # Proxy to Next.js (port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # CRITICAL: pass Host header for subdomain routing
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for HMR in dev, optional in prod)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js static files — cache aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Public static files
    location /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 30d;
    }

    # Max upload size (for future file uploads)
    client_max_body_size 10M;
}
